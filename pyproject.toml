[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
  "slow: marks tests as slow (requires API calls)",
  "unit: pure unit tests with no I/O",
  "integration: requires populated data or API access",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]
